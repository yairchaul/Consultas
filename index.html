<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Buscador de Centros de Trabajo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            min-height: 100vh; 
            padding: 0.75rem; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.94); 
            backdrop-filter: blur(2px); 
            border-radius: 1.5rem; 
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25); 
            overflow: hidden; 
        }
        .hero { 
            background: linear-gradient(105deg, #1a2a3a 0%, #0f212f 100%); 
            padding: 1.2rem 1.2rem 1rem; 
            text-align: center; 
            border-bottom: 4px solid #ffb74d; 
        }
        h1 { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        h1::before { content: "📍"; font-size: 1.4rem; }
        .sub { color: #cbd5e1; margin-top: 0.4rem; font-size: 0.75rem; }
        .search-section { padding: 0.8rem 1rem; background: white; border-bottom: 1px solid #e9eef3; }
        .search-box { position: relative; max-width: 100%; margin: 0 auto; }
        .search-icon { 
            position: absolute; 
            left: 1rem; 
            top: 50%; 
            transform: translateY(-50%); 
            width: 18px; 
            height: 18px; 
            fill: #6c86a3; 
            pointer-events: none; 
        }
        #searchInput { 
            width: 100%; 
            padding: 0.7rem 1rem 0.7rem 2.6rem; 
            font-size: 0.85rem; 
            font-family: 'Inter', sans-serif; 
            border: 2px solid #e2e8f0; 
            border-radius: 50px; 
            background: #fefefe; 
            transition: all 0.25s ease; 
        }
        #searchInput:focus { 
            outline: none; 
            border-color: #ffb74d; 
            box-shadow: 0 0 0 3px rgba(255, 183, 77, 0.2); 
        }
        .stats-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            margin-top: 0.6rem; 
            gap: 0.4rem; 
            font-size: 0.7rem; 
        }
        .badge-count { 
            background: #ecfdf5; 
            padding: 0.2rem 0.7rem; 
            border-radius: 40px; 
            color: #0b5e42; 
            font-weight: 600; 
        }
        .clear-btn { 
            background: none; 
            border: 1px solid #cbd5e1; 
            padding: 0.2rem 0.7rem; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 0.65rem; 
            transition: all 0.2s; 
        }
        .clear-btn:hover { background: #f1f5f9; border-color: #ffb74d; }
        
        .results-panel { 
            background: #ffffff; 
            padding: 0.6rem; 
        }
        .results-header { 
            padding: 0 0.4rem 0.5rem 0.4rem; 
            font-weight: 600; 
            font-size: 0.9rem; 
            border-bottom: 2px solid #ffedd5; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .results-header span { 
            background: #ffb74d20; 
            padding: 1px 8px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
        }
        #resultsContainer { 
            max-height: 600px; 
            overflow-y: auto; 
            padding-right: 3px; 
        }
        .school-card { 
            background: white; 
            border-radius: 0.8rem; 
            padding: 0.7rem; 
            margin-bottom: 0.7rem; 
            border: 1px solid #edf2f7; 
            transition: all 0.2s ease; 
            -webkit-tap-highlight-color: rgba(255, 183, 77, 0.3); 
        }
        .school-card:active { 
            transform: scale(0.99); 
            border-color: #ffdeae; 
            box-shadow: 0 4px 12px -6px rgba(0, 0, 0, 0.1); 
        }
        .school-name { 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: #0c2b3b; 
            display: flex; 
            align-items: baseline; 
            gap: 6px; 
            flex-wrap: wrap; 
            margin-bottom: 4px; 
        }
        .cct-badge { 
            background: #eef2ff; 
            font-size: 0.55rem; 
            font-weight: 600; 
            padding: 0.15rem 0.4rem; 
            border-radius: 20px; 
            color: #1e40af; 
            font-family: monospace; 
        }
        .school-address { 
            font-size: 0.65rem; 
            color: #5b6e8c; 
            margin: 0.2rem 0; 
            display: flex; 
            gap: 4px; 
            align-items: center; 
        }
        .school-details { 
            font-size: 0.62rem; 
            color: #2c5a2e; 
            margin: 0.3rem 0; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 3px 8px; 
            background: #f8fafc; 
            padding: 5px 7px; 
            border-radius: 10px; 
        }
        .school-details span { font-weight: 600; color: #1e293b; }
        .school-details .phone-link { 
            color: #1e40af; 
            text-decoration: none; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 2px; 
            padding: 2px 4px; 
            border-radius: 12px; 
            background: #eef2ff; 
            touch-action: manipulation; 
            margin: 1px 0;
        }
        .school-details .phone-link:active { background: #ffb74d; color: white; }
        .school-details .phone-incompleto {
            color: #b91c1c;
            font-size: 0.6rem;
            background: #fee2e2;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-left: 2px;
        }
        .acciones { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .ver-mapa-link { 
            font-size: 0.65rem; 
            background: none; 
            border: none; 
            color: #f59e0b; 
            font-weight: 600; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
            padding: 4px 8px; 
            border-radius: 20px; 
            transition: background 0.2s; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }
        .ver-mapa-link:active { background: #fef3c7; color: #d97706; }
        .empty-state { 
            text-align: center; 
            padding: 2rem 1rem; 
            color: #8ba0bc; 
            font-size: 0.8rem; 
        }
        .loading-spinner { 
            display: inline-block; 
            width: 18px; 
            height: 18px; 
            border: 2px solid #f3f3f3; 
            border-top: 2px solid #ffb74d; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-right: 6px; 
            vertical-align: middle; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { 
            body { padding: 0.4rem; } 
            .school-details { grid-template-columns: 1fr 1fr; gap: 2px 6px; font-size: 0.6rem; } 
            .school-name { font-size: 0.8rem; } 
            .school-card { padding: 0.6rem; } 
            #resultsContainer { max-height: 500px; } 
        }
        @media (max-width: 480px) { 
            .school-details { grid-template-columns: 1fr; } 
        }
        #resultsContainer::-webkit-scrollbar { width: 3px; }
        #resultsContainer::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        #resultsContainer::-webkit-scrollbar-thumb { background: #ffb74d; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Buscador de Centros de Trabajo</h1>
        <div class="sub">📍 Busca por nombre o CCT · Sin mapa para mayor velocidad</div>
    </div>
    <div class="search-section">
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Ej: 'Benito Juarez' o '09DST0001Z'">
        </div>
        <div class="stats-bar">
            <div class="badge-count" id="totalCountText">Cargando centros...</div>
            <button id="clearSearchBtn" class="clear-btn">✖ Limpiar</button>
        </div>
    </div>
    <div class="results-panel">
        <div class="results-header">🏫 Centros educativos <span id="resultCount">0</span></div>
        <div id="resultsContainer"><div class="empty-state">🔍 Escribe para buscar centros...</div></div>
    </div>
</div>
<script>
    const GOOGLE_SHEET_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxAgXISY3emQKTuIKIvTHPGZI80gxsb6DDiZK2c_6Db09QoZ_aOI0bKvITvosX-8XhFDxUgkURgOtF/pub?gid=0&single=true&output=tsv';
    let schoolsData = [];

    // Normalizar texto (eliminar acentos)
    function normalizarTexto(texto) {
        if (!texto) return '';
        return texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/ñ/g, 'n');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    // ======== FUNCIÓN PARA LIMPIAR Y VALIDAR NÚMEROS DE TELÉFONO ========
    function limpiarNumeroTelefono(numero) {
        if (!numero) return null;
        // Limpiar: eliminar espacios, guiones, paréntesis y dejar solo dígitos
        let limpio = numero.toString().replace(/[\s\-\(\)]/g, '');
        // Si solo tiene dígitos y longitud 10, es válido
        if (/^\d{10}$/.test(limpio)) {
            return limpio;
        }
        return null;
    }

    // ======== FUNCIÓN PARA EXTRAER MÚLTIPLES NÚMEROS DE UN TEXTO ========
    function extraerNumerosTelefono(texto) {
        if (!texto) return [];
        const numeros = [];
        // Buscar secuencias de 10 dígitos (pueden tener espacios, guiones o paréntesis)
        const regex = /(\d{2,4}[\s\-\(\)]*\d{2,4}[\s\-\(\)]*\d{2,4}[\s\-\(\)]*\d{2,4})/g;
        const matches = texto.match(regex);
        if (matches) {
            for (let match of matches) {
                const limpio = limpiarNumeroTelefono(match);
                if (limpio) {
                    numeros.push(limpio);
                }
            }
        }
        // Si no encontró con regex, intentar limpiar directamente
        if (numeros.length === 0) {
            const limpio = limpiarNumeroTelefono(texto);
            if (limpio) numeros.push(limpio);
        }
        return numeros;
    }

    // ======== FUNCIÓN PARA DETERMINAR SI UN NÚMERO ES VÁLIDO ========
    function esNumeroValido(numero) {
        return numero && /^\d{10}$/.test(numero);
    }

    // ======== FUNCIÓN PARA GENERAR HTML DE UN TELÉFONO ========
    function generarTelefonoHtml(etiqueta, nombre, telefonoRaw) {
        if (!telefonoRaw) return '';
        
        const numeros = extraerNumerosTelefono(telefonoRaw);
        let html = `<span>${etiqueta}:</span> ${escapeHtml(nombre || '')} `;
        
        if (numeros.length === 0) {
            // No se encontraron números válidos
            html += `<span class="phone-incompleto">⚠️ Datos incompletos</span>`;
        } else {
            // Mostrar cada número como enlace
            const links = numeros.map(num => {
                return `<a class="phone-link" href="tel:${num}" onclick="event.stopPropagation();">📞 ${num}</a>`;
            });
            html += links.join(' ');
        }
        
        return html;
    }

    function renderSchools(filteredSchools) {
        document.getElementById('resultCount').innerText = filteredSchools.length;
        if (schoolsData.length) document.getElementById('totalCountText').innerHTML = `📚 Total: ${schoolsData.length}`;

        const container = document.getElementById('resultsContainer');
        if (!filteredSchools.length) {
            container.innerHTML = `<div class="empty-state">🏫 No se encontraron centros.<br>Prueba con otro nombre o CCT.</div>`;
            return;
        }

        let cardsHtml = '';

        filteredSchools.forEach(school => {
            const direccionCompleta = [school.calleYNumero, school.colonia, school.alcaldia, school.cP].filter(p => p && p !== 'N/A' && p !== '0').join(', ') || 'Dirección no especificada';
            
            // Generar HTML para teléfonos con la nueva lógica
            const telefono1Html = generarTelefonoHtml('👤 Enlace 1', school.enlace1, school.telefonoEnlace1);
            const telefono2Html = generarTelefonoHtml('👤 Enlace 2', school.enlace2, school.telEnlace2);
            
            cardsHtml += `
                <div class="school-card" data-cct="${escapeHtml(school.cct || '')}">
                    <div class="school-name">🏫 ${escapeHtml(school.nombreDelCct || 'Sin nombre')}<span class="cct-badge">${escapeHtml(school.cct || 'Sin CCT')}</span></div>
                    <div class="school-address">📍 ${escapeHtml(direccionCompleta)}</div>
                    <div class="school-details">
                        <div><span>🖥️ Escritorio:</span> ${school.cantidadDeEquiposDeEscritorioRequeridos || '0'}</div>
                        <div><span>💻 Laptop:</span> ${school.cantidadDeEquiposLaptopRequeridos || '0'}</div>
                        <div><span>📊 Total equipos:</span> ${school.totalDeEquipos || '0'}</div>
                        <div><span>📅 Entrega:</span> ${escapeHtml(school.diaDeEntrega || 'N/A')}</div>
                        <div style="grid-column: span 2;">${telefono1Html}</div>
                        <div style="grid-column: span 2;">${telefono2Html}</div>
                    </div>
                    <div class="acciones">
                        <button class="ver-mapa-link" data-direccion="${escapeHtml(direccionCompleta)}" onclick="event.stopPropagation();">🗺️ Ver en Google Maps</button>
                    </div>
                </div>
            `;
        });

        container.innerHTML = cardsHtml;

        // ======== BOTÓN "VER EN GOOGLE MAPS" ========
        document.querySelectorAll('.ver-mapa-link').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                const direccion = this.dataset.direccion;
                if (direccion && direccion !== 'Dirección no especificada') {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(direccion + ', CDMX, México')}`, '_blank');
                }
            });
        });

        // ======== ENLACES DE TELÉFONO ========
        document.querySelectorAll('.phone-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    }

    // ======== BÚSQUEDA QUE IGNORA ACENTOS ========
    function performSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) { 
            renderSchools(schoolsData); 
            return; 
        }
        
        const queryNormalizada = normalizarTexto(query);
        
        const filtered = schoolsData.filter(school => {
            const nombreNormalizado = normalizarTexto(school.nombreDelCct || '');
            const cctNormalizado = normalizarTexto(school.cct || '');
            return nombreNormalizado.includes(queryNormalizada) || 
                   cctNormalizado.includes(queryNormalizada);
        });
        
        renderSchools(filtered);
    }

    function debounce(fn, d) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), d); }; }

    function parseTSVToSchools(tsvText) {
        const lines = tsvText.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return [];
        const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
        const getIdx = names => { for (let n of names) { let i = headers.findIndex(h => h === n); if (i !== -1) return i; } return -1; };
        
        const idxNombre = getIdx(['nombre del cct', 'nombre del centro', 'nombre']);
        const idxCCT = getIdx(['cct']);
        const idxCalle = getIdx(['calle y número', 'calle y numero']);
        const idxColonia = getIdx(['colonia']);
        const idxAlcaldia = getIdx(['alcaldía', 'alcaldia']);
        const idxCP = getIdx(['c. p.', 'cp']);
        const idxDiaEntrega = getIdx(['día de entrega', 'dia de entrega']);
        const idxEscritorio = getIdx(['cantidad de equipos de escritorio requeridos']);
        const idxLaptop = getIdx(['cantidad de equipos laptop requeridos']);
        const idxTotal = getIdx(['total de equipos']);
        const idxEnlace1 = getIdx(['enlace 1']);
        const idxTel1 = getIdx(['teléfono enlace 1', 'telefono enlace 1']);
        const idxEnlace2 = getIdx(['enlace 2']);
        const idxTel2 = getIdx(['tel. enlace 2', 'teléfono enlace 2']);
        
        const schools = [];
        
        for (let i = 1; i < lines.length; i++) {
            const v = lines[i].split('\t').map(x => x.trim().replace(/^"|"$/g, ''));
            if (v.length < 2) continue;
            
            schools.push({
                nombreDelCct: idxNombre !== -1 ? v[idxNombre] || '' : '',
                cct: idxCCT !== -1 ? v[idxCCT] || '' : '',
                calleYNumero: idxCalle !== -1 ? v[idxCalle] || '' : '',
                colonia: idxColonia !== -1 ? v[idxColonia] || '' : '',
                alcaldia: idxAlcaldia !== -1 ? v[idxAlcaldia] || '' : '',
                cP: idxCP !== -1 ? v[idxCP] || '' : '',
                diaDeEntrega: idxDiaEntrega !== -1 ? v[idxDiaEntrega] || '' : '',
                cantidadDeEquiposDeEscritorioRequeridos: idxEscritorio !== -1 ? v[idxEscritorio] || '0' : '0',
                cantidadDeEquiposLaptopRequeridos: idxLaptop !== -1 ? v[idxLaptop] || '0' : '0',
                totalDeEquipos: idxTotal !== -1 ? v[idxTotal] || '0' : '0',
                enlace1: idxEnlace1 !== -1 ? v[idxEnlace1] || '' : '',
                telefonoEnlace1: idxTel1 !== -1 ? v[idxTel1] || '' : '',
                enlace2: idxEnlace2 !== -1 ? v[idxEnlace2] || '' : '',
                telEnlace2: idxTel2 !== -1 ? v[idxTel2] || '' : ''
            });
        }
        return schools;
    }

    async function loadData() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = `<div class="empty-state"><div class="loading-spinner"></div> Cargando datos...</div>`;
        try {
            const response = await fetch(GOOGLE_SHEET_TSV_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            if (!text || text.includes('<!DOCTYPE')) throw new Error('URL inválida');
            schoolsData = parseTSVToSchools(text);
            if (!schoolsData.length) throw new Error('No hay registros');
            renderSchools(schoolsData);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="empty-state" style="color:#c62828;">⚠️ Error cargando datos.<br>Verifica que la hoja esté publicada correctamente.</div>`;
            document.getElementById('totalCountText').innerHTML = '⚠️ Error';
        }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        loadData(); 
        const si = document.getElementById('searchInput'); 
        const cb = document.getElementById('clearSearchBtn'); 
        si.addEventListener('input', debounce(performSearch, 300)); 
        cb.addEventListener('click', () => { si.value = ''; performSearch(); si.focus(); }); 
    });
</script>
</body>
</html>
